<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
				linear-gradient(
					180deg,
					#13315c 0%,
					#22548f 100%
				);
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .card {
            background: rgba(14, 22, 34, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.11);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
        }

        .search-block {
            margin-bottom: 35px;
        }

        .search-block:last-child {
            margin-bottom: 0;
        }

        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .search-name {
            font-size: 18px;
            font-weight: 600;
        }

        .google-options {
            display: flex;
            gap: 18px;
        }

        .google-options label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .google-options input[type="radio"],
        .google-options input[type="checkbox"] {
            margin: 0;
        }

        .search-row {
            display: flex;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            padding: 12px 14px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.82);
            color: black;
            font-size: 15px;
            outline: none;
        }

        .search-input:focus {
            box-shadow:
                0 0 0 3px rgba(59, 130, 246, 0.55),
                0 0 18px rgba(59, 130, 246, 0.35);
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-search {
            background: rgba(82, 126, 212, 0.90);
        }

        .btn-search:hover {
            background: rgba(98, 142, 228, 0.96);
        }

        .btn-clear {
            background: rgba(192, 82, 96, 0.90);
        }

        .btn-clear:hover {
            background: rgba(208, 96, 110, 0.96);
        }

        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .shortcut {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 48px;
            padding: 12px 14px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.11);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
        }

        .shortcut:hover {
            background: rgba(255, 255, 255, 0.145);
            transform: translateY(-1px);
        }

        .shortcut img {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            border-radius: 4px;
        }

        .shortcut span {
            font-size: 15px;
            font-weight: 500;
        }

        @media (max-width: 900px) {

            .shortcuts-grid {
                grid-template-columns: repeat(2, 1fr);
            }

        }

        @media (max-width: 700px) {

            body {
                padding: 20px;
            }

            .card {
                padding: 25px;
            }

            .search-row {
                flex-wrap: wrap;
            }

            .search-input {
                width: 100%;
                flex: unset;
            }

            .btn {
                flex: 1;
            }

            .shortcuts-grid {
                grid-template-columns: 1fr;
            }

        }

    </style>

</head>

<body>

    <div class="main-container">

        <!-- SEARCH -->

        <div class="card">

            <!-- SEARCH INPUT -->

            <div class="search-block">

                <div class="search-header">

                    <div class="search-name">Search</div>

                    <div class="google-options">

                        <label>
                            <input type="radio" name="googleMode" value="br" checked>
                            BR
                        </label>

                        <label>
                            <input type="radio" name="googleMode" value="ncr">
                            NCR
                        </label>

                        <label>
                            <input type="checkbox" id="searchImages">
                            IMAGES
                        </label>

                    </div>

                </div>

                <div class="search-row">

                    <input
                        class="search-input"
                        type="text"
                        id="searchInput"
                        placeholder="Type here what you want to search."
                        onkeydown="handleKey(event)"
                        autofocus
                    >

                    <button class="btn btn-search" onclick="searchDuck()">
                        DuckDuckGo
                    </button>

                    <button class="btn btn-search" onclick="searchGoogle()">
                        Google
                    </button>

                    <button class="btn btn-clear" onclick="clearInput()">
                        Limpar
                    </button>

                </div>

            </div>

        <!-- SHORTCUTS -->

        <div class="card">

            <div class="shortcuts-grid" id="shortcutsGrid"></div>

        </div>

    </div>

    <script>

        // =========================================
        // SHORTCUTS
        // =========================================

        const shortcuts = [

            {
                name: 'Instagram',
                url: 'https://www.instagram.com/',
                icon: ''
            },

            {
                name: 'Inoreader',
                url: 'https://www.inoreader.com/all_articles',
                icon: ''
            },

            {
                name: 'YouTube',
                url: 'https://youtube.com',
                icon: ''
            },

            {
                name: 'Google Translate',
                url: 'https://translate.google.com/?sl=auto&tl=pt&op=translate',
                icon: ''
            },

            {
                name: 'ChatGPT',
                url: 'https://chatgpt.com/',
                icon: ''
            },

            {
                name: 'Perplexity',
                url: 'https://www.perplexity.ai/',
                icon: ''
            },

            {
                name: 'JustWatch',
                url: 'https://www.justwatch.com/br',
                icon: ''
            },

            {
                name: 'GitHub',
                url: 'https://github.com/',
                icon: ''
            }

        ];

        function getDomain(url) {

            return new URL(url).hostname;

        }

        function getOrigin(url) {

            return new URL(url).origin;

        }

        function getIconBase(shortcut) {

            if (shortcut.icon && shortcut.icon.trim() !== '') {

                return shortcut.icon;

            }

            return shortcut.url;

        }

        function getFaviconSources(shortcut) {

            const base = getIconBase(shortcut);

            const domain = getDomain(base);

            const origin = getOrigin(base);

            return [

                // DuckDuckGo
                `https://icons.duckduckgo.com/ip3/${domain}.ico`,

                // Google
                `https://www.google.com/s2/favicons?domain=${domain}&sz=64`,

                // favicon.ico tradicional
                `${origin}/favicon.ico`

            ];

        }

        function createShortcut(shortcutData) {

            const a = document.createElement('a');

            a.className = 'shortcut';
            a.href = shortcutData.url;

            const img = document.createElement('img');

            const faviconSources = getFaviconSources(shortcutData);

            let current = 0;

            img.src = faviconSources[current];

            img.onerror = () => {

                current++;

                if (current < faviconSources.length) {

                    img.src = faviconSources[current];

                }

            };

            const span = document.createElement('span');

            span.textContent = shortcutData.name;

            a.appendChild(img);
            a.appendChild(span);

            return a;

        }

        function renderShortcuts() {

            const grid = document.getElementById('shortcutsGrid');

            shortcuts.forEach(shortcut => {

                grid.appendChild(
                    createShortcut(shortcut)
                );

            });

        }

        renderShortcuts();

        // =========================================
        // GOOGLE
        // =========================================

        function getGoogleMode() {

            return document.querySelector(
                'input[name="googleMode"]:checked'
            ).value;

        }

        function searchGoogle() {

            const query = document
                .getElementById('searchInput')
                .value
                .trim();

            if (!query)
                return;

            const mode = getGoogleMode();

            const images = document
                .getElementById('searchImages')
                .checked;

            let url;

            if (mode === 'br') {

                if (images) {

                    url =
                        `https://www.google.com.br/search?tbm=isch&q=${encodeURIComponent(query)}`;

                }
                else {

                    url =
                        `https://www.google.com.br/search?udm=14&q=${encodeURIComponent(query)}`;

                }

            }
            else {

                if (images) {

                    url =
                        `https://www.google.com/search?pws=0&gl=001&tbm=isch&q=${encodeURIComponent(query)}`;

                }
                else {

                    url =
                        `https://www.google.com/search?pws=0&gl=001&udm=14&q=${encodeURIComponent(query)}`;

                }

            }

            window.location.href = url;

        }

        // =========================================
        // DUCK
        // =========================================

        function searchDuck() {

            const query = document
                .getElementById('searchInput')
                .value
                .trim();

            if (!query)
                return;

            const images = document
                .getElementById('searchImages')
                .checked;

            let url;

            if (images) {

                url =
                    `https://duckduckgo.com/?q=${encodeURIComponent(query)}&iax=images&ia=images`;

            }
            else {

                url =
                    `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;

            }

            window.location.href = url;

        }

        // =========================================
        // HELPERS
        // =========================================

        function clearInput() {

            const input = document.getElementById('searchInput');

            input.value = '';

            input.focus();

        }

        function handleKey(event) {

            if (event.key === 'Enter') {

                searchDuck();

            }

            if (event.key === 'Escape') {

                clearInput();

            }

        }

    </script>

</body>

</html>
