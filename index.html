<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Home</title>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: Arial, sans-serif;
                color: white;
                background-image: url('fundo.png');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                display: flex;
                justify-content: center;
                padding: 30px 30px 30px 30px;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.55);
                z-index: 1;
            }

            .main-container {
                position: relative;
                z-index: 2;
                width: 100%;
                max-width: 1100px;
                display: flex;
                flex-direction: column;
                gap: 25px;
            }

            .card {
                background: rgba(15, 15, 15, 0.65);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                padding: 35px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
            }

            .card-title {
                text-align: center;
                margin-top: 0;
                margin-bottom: 35px;
                font-size: 20px;
                letter-spacing: 4px;
                font-weight: 700;
            }

            .search-block {
                margin-bottom: 35px;
            }

            .search-block:last-child {
                margin-bottom: 0;
            }

            .search-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 14px;
            }

            .search-name {
                font-size: 18px;
                font-weight: bold;
            }

            .google-options {
                display: flex;
                gap: 18px;
            }

            .google-options label {
                display: flex;
                align-items: center;
                gap: 4px;
                cursor: pointer;
                font-size: 14px;
                opacity: 0.9;
            }

            .search-row {
                display: flex;
                gap: 12px;
            }

            .search-input {
                flex: 1;
                padding: 15px;
                border: none;
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.92);
                color: black;
                font-size: 16px;
                outline: none;
            }

            .search-input:focus {
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.55), 0 0 18px rgba(59, 130, 246, 0.35);
            }


            .btn {
                padding: 15px 18px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                color: white;
                font-size: 14px;
                font-weight: bold;
                transition: background 0.2s, transform 0.15s;
            }

            .btn:hover {
                transform: translateY(-1px);
            }

            .btn-search {
                background: #2563EB;
            }

            .btn-search:hover {
                background: #1D4ED8;
            }

            .btn-clear {
                background: #DC2626;
            }

            .btn-clear:hover {
                background: #B91C1C;
            }

            .shortcuts-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }

            .shortcut {
                display: flex;
                align-items: center;
                gap: 14px;
                min-height: 70px;
                padding: 16px;
                border-radius: 14px;
                text-decoration: none;
                color: white;
                background: rgba(255, 255, 255, 0.07);
                transition: background 0.2s, transform 0.15s;
            }

            .shortcut:hover {
                background: rgba(255, 255, 255, 0.12);
                transform: translateY(-2px);
            }

            .shortcut img {
                width: 24px;
                height: 24px;
                flex-shrink: 0;
            }

            .shortcut span {
                font-size: 15px;
            }

            .logo-container {
                text-align: center;
            }

            .logo {
                width: 130px;
                opacity: 1;
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.25));
                transition: transform 0.2s, filter 0.2s;
            }

            .logo:hover {
                transform: scale(1.05);
                filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.35));
            }

            @media (max-width: 900px) {

                .shortcuts-grid {
                    grid-template-columns: repeat(2, 1fr);
                }

            }

            @media (max-width: 700px) {

                body {
                    padding: 40px 20px 40px 20px;
                }

                .card {
                    padding: 25px;
                }

                .search-header {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 10px;
                }

                .search-row {
                    flex-wrap: wrap;
                }

                .search-input {
                    width: 100%;
                    flex: unset;
                }

                .btn {
                    flex: 1;
                }

                .shortcuts-grid {
                    grid-template-columns: 1fr;
                }

                .logo {
                    width: 100px;
                }

            }
        </style>

    </head>

    <body>

        <div class="overlay"></div>

        <div class="main-container">

            <!-- SEARCH -->

            <div class="card">

                <!-- GOOGLE -->

                <div class="search-block">
                    <div class="search-header">
                        <div class="search-name">Google</div>
                        <div class="google-options">
                            <label>
                                <input type="radio" name="googleMode" value="br" checked>
                                BR
                            </label>
                            <label>
                                <input type="radio" name="googleMode" value="ncr">
                                NCR
                            </label>
                            <label>
                                <input type="checkbox" id="googleImages">
                                IMAGES
                            </label>
                        </div>
                    </div>
                    <div class="search-row">
                        <input class="search-input" type="text" id="googleSearch" placeholder="Search with Google..."
                            onkeydown="handleKey(event, 'google')" autofocus>
                        <button class="btn btn-search" onclick="searchGoogle()">
                            Search
                        </button>
                        <button class="btn btn-clear" onclick="clearInput('googleSearch')">
                            Clear
                        </button>
                    </div>
                </div>

                <!-- DUCK -->

                <div class="search-block">
                    <div class="search-header">
                        <div class="search-name">DuckDuckGo</div>
                        <div class="google-options">
                            <label>
                                <input type="checkbox" id="duckImages">
                                IMAGES
                            </label>
                        </div>
                    </div>
                    <div class="search-row">
                        <input class="search-input" type="text" id="duckSearch" placeholder="Search with DuckDuckGo..."
                            onkeydown="handleKey(event, 'duck')">
                        <button class="btn btn-search" onclick="searchDuck()">
                            Search
                        </button>
                        <button class="btn btn-clear" onclick="clearInput('duckSearch')">
                            Clear
                        </button>
                    </div>
                </div>
            </div>

            <!-- SHORTCUTS -->

            <div class="card">
                <div class="shortcuts-grid">
                    <a class="shortcut" href="https://www.instagram.com/">
                        <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=64">
                        <span>Instagram</span>
                    </a>
                    <a class="shortcut" href="#" onclick="openWebUrl('https://www.instagram.com/')">
                        <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=64">
                        <span>Instagram</span>
                    </a>
                    <a class="shortcut" href="https://www.inoreader.com/all_articles">
                        <img src="https://www.google.com/s2/favicons?domain=inoreader.com&sz=64">
                        <span>Inoreader</span>
                    </a>
                    <a class="shortcut" href="https://youtube.com">
                        <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=64">
                        <span>YouTube</span>
                    </a>
                    <a class="shortcut" href="https://translate.google.com/?sl=auto&tl=pt&op=translate">
                        <img src="https://www.google.com/s2/favicons?domain=translate.google.com&sz=64">
                        <span>Google Translate</span>
                    </a>
                    <a class="shortcut" href="https://chatgpt.com/">
                        <img src="https://www.google.com/s2/favicons?domain=chatgpt.com&sz=64">
                        <span>ChatGPT</span>
                    </a>
                    <a class="shortcut" href="https://www.perplexity.ai/">
                        <img src="https://www.google.com/s2/favicons?domain=perplexity.com&sz=64">
                        <span>Perplexity</span>
                    </a>
                    <a class="shortcut" href="https://www.justwatch.com/br">
                        <img src="https://www.google.com/s2/favicons?domain=justwatch.com&sz=64">
                        <span>JustWatch</span>
                    </a>
                    <a class="shortcut" href="https://github.com">
                        <img src="https://www.google.com/s2/favicons?domain=github.com&sz=64">
                        <span>GitHub</span>
                    </a>
                </div>
            </div>
        </div>

        <script>

            function getGoogleMode() {

                return document.querySelector('input[name="googleMode"]:checked').value;

            }

            function searchGoogle() {

                const query = document.getElementById('googleSearch').value.trim();

                if (!query)
                    return;

                const mode = getGoogleMode();

                const images = document.getElementById('googleImages').checked;

                let url;

                if (mode === 'br') {
                    if (images) {
                        url = `https://www.google.com.br/search?tbm=isch&q=${encodeURIComponent(query)}`;
                    }
                    else {
                        url = `https://www.google.com.br/search?udm=14&q=${encodeURIComponent(query)}`;
                    }
                }
                else {
                    if (images) {
                        url = `https://www.google.com/search?pws=0&gl=001&tbm=isch&q=${encodeURIComponent(query)}`;
                    }
                    else {
                        url = `https://www.google.com/search?pws=0&gl=001&udm=14&q=${encodeURIComponent(query)}`;
                    }
                }

                window.location.href = url;

            }


            function searchDuck() {

                const query = document.getElementById('duckSearch').value.trim();

                if (!query)
                    return;

                const images = document.getElementById('duckImages').checked;

                let url;

                if (images) {
                    url = `https://duckduckgo.com/?q=${encodeURIComponent(query)}&iax=images&ia=images`;
                }
                else {
                    url = `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;
                }

                window.location.href = url;

            }


            function clearInput(id) {

                document.getElementById(id).value = '';

            }

            function handleKey(event, mode) {

                if (event.key === 'Enter') {
                    if (mode === 'google') {
                        searchGoogle();
                    }
                    else {
                        searchDuck();
                    }
                }

                if (event.key === 'Escape') {
                    if (mode === 'google') {
                        clearInput('googleSearch');
                    }
                    else {
                        clearInput('duckSearch');
                    }
                }

            }

            function openWebUrl(url) {

                window.location.assign(url);

            }

        </script>

    </body>

</html>
